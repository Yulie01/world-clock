<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.js"></script>
    <title>World Clock - Yulie Totoda</title>
</head>
<body>
    <div class="container">
        <h1>World Clock</h1>
        <select id="city">
          <option value="">Select a city..</option>
          <option value="current">My current location </option>
          <option value="Europe/Rome">Rome</option>
          <option value="America/New_York">New York</option>
          <option value="Asia/Jakarta">Jakarta</option>
        </select>
  
        <div id="cities">
          <div class="city" id="Chicago">
            <div>
              <h2>Chicago 🇺🇸</h2>
              <div class="date"></div>
            </div>
            <div class="time"></div>
          </div>
          <div class="city" id="Valletta">
            <div>
              <h2>Valletta 🇲🇹</h2>
              <div class="date">March 10th 2026</div>
            </div>
            <div class="time">10:22:30 <small> AM</small></div>
          </div>
          <div class="city" id="Fiji">
            <div>
              <h2>Fiji 🇫🇯</h2>
              <div class="date">March 10th 2026</div>
            </div>
            <div class="time">10:41:30<small>PM</small></div>
          </div>
        </div>
      </div>
    <footer>
        This project was coded by Yulie Totoda and is open sourced on <a href="https://github.com/Yulie01/world-clock" target="-blank">GitHub</a>.
    </footer>
    <script src="javascript/index.js"></script>
</body>
</html>
