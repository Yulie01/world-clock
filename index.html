<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>World Clock - Yulie Totoda</title>
</head>
<body>
    <div class="container">
        <h1>World Clock</h1>
        <select id="city">
          <option value="">Select a city..</option>
          <option value="current">My current location</option>
          <option value="Europe/Rome">Rome</option>
          <option value="America/New_York">New York</option>
          <option value="Asia/Jakarta">Jakarta</option>
        </select>
  
        <div id="cities">
          <div class="city" id="California">
            <div>
              <h2>California 🇺🇸</h2>
              <div class="date">March 9th 2026</div>
            </div>
            <div class="time">5:2:48 AM</div>
          </div>
          <div class="city" id="Oslo">
            <div>
              <h2>Oslo 🇳🇴</h2>
              <div class="date">March 9th 2026</div>
            </div>
            <div class="time">1:04:49 PM</div>
          </div>
        </div>
      </div>
    <footer>
        This project was coded by Yulie Totoda and is open sourced on <a href="https://github.com/Yulie01/world-clock" target="-blank">GitHub</a>.
    </footer>
    <script src="javascript/index.js"></script>
</body>
</html>
